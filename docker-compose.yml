services:
  portfolio:
    container_name: portfolio-christelle
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    restart: always

    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3000" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
